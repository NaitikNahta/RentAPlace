<div class="register-container">
  <div class="register-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join RentAPlace today</p>

    <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
  <label>Password</label>
  <div class="password-wrapper">
    <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="Enter your password" />
    <span class="eye-icon" (click)="showPassword = !showPassword">
      {{ showPassword ? '👁️' : '🙈' }}
    </span>
  </div>
</div>

    <div class="form-group">
      <label>Register As</label>
      <select [(ngModel)]="roleId">
        <option [value]="3">Renter</option>
        <option [value]="2">Owner</option>
      </select>
    </div>

    <button class="register-btn" (click)="onRegister()">Register</button>

    <p class="login-link">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
